<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCB X-ray</title>
    <style>
      :root {
        --opacity: 0.5;
      }

      html,
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }

      * {
        user-select: none;
      }

      body {
        background: #0d1118;
        color: #e8eefc;
      }

      main {
        position: fixed;
        inset: 0;
        overflow: hidden;
      }

      button {
        cursor: pointer;
      }

      #viewport {
        position: absolute;
        inset: 0;
        overflow: hidden;
        touch-action: none;
      }

      #scene {
        position: absolute;
        left: 0;
        top: 0;
        width: 1765px;
        height: 1765px;
        transform-origin: 0 0;
      }

      #scene img,
      #scene svg {
        position: absolute;
        left: 0;
        top: 0;
        width: 1765px;
        height: 1765px;
      }

      label,
      input {
        cursor: pointer;
      }

      #help {
        z-index: 100;
        position: absolute;
        list-style: none;
        margin: 0;
        padding: 12px;
        user-select: none;
        background: rgba(5, 10, 18, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 10px;
        max-width: min(300px, calc(100vw - 24px));
      }

      .allow {
        pointer-events: all;
      }

      .layer {
        opacity: var(--opacity);
      }

      .net-path {
        stroke-linejoin: round;
        stroke-linecap: round;
      }

      .net-path.is-hover,
      .net-path.is-selected {
        filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.8));
      }

      .net-path.is-selected {
        stroke-width: calc(var(--stroke-width, 1) + 1.25px);
      }

      .net-hit {
        fill: none;
        stroke: transparent;
        pointer-events: stroke;
      }

      #download,
      #edit {
        position: absolute;
        margin: 20px;
        bottom: 0;
        z-index: 120;
      }

      #download {
        right: 0;
      }

      #edit {
        right: 140px;
      }

      #legend-list {
        margin: 6px 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 4px;
        max-height: min(40vh, 320px);
        overflow: auto;
      }

      #legend-list li {
        display: grid;
        grid-template-columns: 16px 16px 1fr;
        gap: 8px;
        align-items: center;
        font-size: 0.85rem;
        line-height: 1.3;
        padding: 4px 6px;
        border-radius: 6px;
      }

      #legend-list li.is-selected {
        background: rgba(255, 255, 255, 0.12);
      }

      #legend-list li.is-hidden {
        opacity: 0.55;
      }

      .legend-toggle {
        margin: 0;
        width: 14px;
        height: 14px;
        accent-color: #7ed8ff;
      }

      .legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.45);
      }

      #legend-empty {
        font-size: 0.85rem;
        color: #b7c2d8;
        margin-top: 4px;
      }
    </style>
  </head>

  <body>
    <ul id="help">
      <li><code>w</code>/<code>s</code> to move through layers
        <br><input class="allow" type="range" value="5" min="0" max="5" id="layer">
      <li><button class="allow" id="flip">flip</button> <button class="allow" id="reset-view">reset view</button>
      <li>Wheel to zoom. Hold <code>space</code> and drag (or middle mouse) to pan.
      <li>Double-click canvas to jump to the opposite-side paired layer.
      <li class="allow">Layer opacity<br><input type="range" value="50" min="0" max="100" id="opacity">
      <li class="allow">
        Net lines (click to highlight)
        <p id="legend-empty">Loading net paths...</p>
        <ul id="legend-list"></ul>
    </ul>

    <main>
      <div id="viewport">
        <div id="scene"></div>
      </div>
    </main>
    <a id="edit" href="./editor.html">Open net editor</a>
    <a id="download" href="./pm/pm-layers.psd">Download .psd</a>
    <script type="module" src="app.js"></script>
  </body>

</html>
