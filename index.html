<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./pm-favicon.png">
    <title>PCB X-ray</title>
    <style>
      :root {
        --opacity: 0.5;
      }

      html,
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }

      * {
        user-select: none;
        box-sizing: border-box;
      }

      body {
        background: #0d1118;
        color: #e8eefc;
      }

      main {
        position: fixed;
        inset: 0;
        overflow: hidden;
      }

      button {
        cursor: pointer;
      }

      #viewport {
        position: absolute;
        inset: 0;
        overflow: hidden;
        touch-action: none;
      }

      #scene {
        position: absolute;
        left: 0;
        top: 0;
        width: 1765px;
        height: 1765px;
        transform-origin: 0 0;
        isolation: isolate;
      }

      #scene img,
      #scene svg {
        position: absolute;
        left: 0;
        top: 0;
        width: 1765px;
        height: 1765px;
      }

      label,
      input {
        cursor: pointer;
      }

      #help {
        z-index: 100;
        position: absolute;
        list-style: none;
        margin: 0;
        padding: 12px;
        user-select: none;
        background: rgba(5, 10, 18, 1);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-bottom-right-radius: 10px;
        max-width: min(300px, calc(100vw - 24px));

        &>li {
          margin-bottom: 20px;
        }
      }

      .allow {
        pointer-events: all;
      }

      .layer {
        opacity: var(--opacity);
      }

      .net-path {
        stroke-linejoin: round;
        stroke-linecap: round;
        paint-order: fill stroke;
      }

      .net-path.has-contrast-ring {
        filter: drop-shadow(0 0 1.1px var(--ring-color, rgba(232, 242, 255, 0.92)));
      }

      :root:not(.has-pinned-path) .net-path:hover,
      .net-path.is-pinned {
        stroke: var(--highlight-stroke, #ffffff);
        stroke-width: calc(var(--stroke-width, 1px) + 0.5px);
        stroke-opacity: 1;
      }

      .net-path.is-legend-hover {
        stroke: var(--highlight-stroke, #ffffff);
        stroke-width: calc(var(--stroke-width, 1px) + 0.5px);
        stroke-opacity: 1;
      }

      #download,
      #edit {
        position: absolute;
        margin: 20px;
        bottom: 0;
        z-index: 120;
      }

      #download {
        right: 0;
      }

      #edit {
        right: 140px;
      }

      #legend-list {
        margin: 6px 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 4px;
      }

      #legend-list li {
        font-size: 0.85rem;
        line-height: 1.3;
        padding: 0;
        border-radius: 6px;
      }

      #legend-list li.is-selected {
        background: rgba(255, 255, 255, 0.12);
      }

      #legend-list li:not(.legend-group-title):hover {
        background: rgba(255, 255, 255, 0.12);
      }

      #legend-list li.is-hidden {
        opacity: 0.55;
      }

      small {
        color: #9ab0d1;
      }

      #legend-list li.legend-group-title {
        font-size: 0.72rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #9ab0d1;
        opacity: 0.9;
        padding: 2px 0;
      }

      .legend-group-toggle {
        width: 100%;
        text-align: left;
        border: 0;
        background: rgba(255, 255, 255, 0.04);
        color: inherit;
        padding: 6px;
        border-radius: 6px;
        font: inherit;
        letter-spacing: inherit;
        text-transform: inherit;
      }

      .legend-group-toggle:hover {
        background: rgba(121, 211, 255, 0.14);
      }

      .legend-row {
        display: grid;
        grid-template-columns: 16px 1fr;
        gap: 8px;
        align-items: center;
        width: 100%;
        padding: 4px 6px;
        cursor: pointer;
      }

      .legend-toggle {
        width: 12px;
        height: 12px;
        margin: 0;
        border-radius: 999px;
        border: 1.5px solid var(--swatch-color, rgba(255, 255, 255, 0.7));
        background: transparent;
        appearance: none;
        -webkit-appearance: none;
        cursor: pointer;
      }

      .legend-toggle:checked {
        background: var(--swatch-color, transparent);
      }

      .legend-toggle:focus-visible {
        outline: 2px solid #e8f2ff;
        outline-offset: 2px;
      }

      #legend-empty {
        font-size: 0.85rem;
        color: #b7c2d8;
        margin-top: 4px;
      }

      #help summary {
        cursor: pointer;
      }

      .help-copy {
        margin-top: 4px;
        color: #b7c2d8;
        font-size: 0.85rem;
        line-height: 1.35;
      }

      [data-net-key="gnd"] input {
        border-color: rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>

  <body>
    <ul id="help">
      <li class="allow">
        <details>
          <summary>Help</summary>
          <p class="help-copy">Wheel to zoom. Hold <code>space</code> and drag (or middle mouse) to pan.</p>
          <p class="help-copy">Double-click canvas to jump to the opposite-side paired layer.</p>
        </details>
      </li>
      <li class="allow"><code>w</code>/<code>s</code> to move through layers<br><input type="range" value="2" min="0"
          max="5" id="layer"><br><button id="flip">flip</button> <button id="reset-view">reset view</button></li>
      <li class="allow">Layer opacity<br><input type="range" value="50" min="0" max="100" id="opacity"></li>
      <li class="allow">
        Net lines <small>(click to highlight)</small>
        <p id="legend-empty">Loading net paths...</p>
        <ul id="legend-list"></ul>
      </li>
    </ul>

    <main>
      <div id="viewport">
        <div id="scene"></div>
      </div>
    </main>
    <a id="edit" href="./editor.html">Open net editor</a>
    <a id="download" href="./pm/pm-layers.psd">Download .psd</a>
    <script type="module" src="app.js"></script>
  </body>

</html>
